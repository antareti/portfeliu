<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Дневник доброго хакера</title>

<link rel="icon" type="image/png" href="o.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050505;
    --text:#e5e5e5;
    --accent:#ff8c00;
    --card:rgba(255,140,0,0.04);
}

body.light{
    --bg:#f4f4f4;
    --text:#111;
    --card:rgba(0,0,0,0.06);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    overflow-x:hidden;
    transition:0.4s;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:repeating-linear-gradient(
        0deg,
        rgba(255,140,0,0.05) 0px,
        rgba(255,140,0,0.05) 1px,
        transparent 1px,
        transparent 40px
    );
    animation:move 25s linear infinite;
    z-index:0;
}

@keyframes move{
    from{transform:translateY(0);}
    to{transform:translateY(-200px);}
}

/* GLITCH INTRO */
#glitch{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
    animation:fadeOut 3s ease forwards;
    animation-delay:2.2s;
}

#glitch h1{
    color:var(--accent);
    font-family:Orbitron;
    font-size:28px;
    animation:glitch 0.2s infinite;
}

@keyframes glitch{
    0%{transform:translate(0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0);}
}

@keyframes fadeOut{
    to{opacity:0;visibility:hidden;}
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
    position:relative;
    z-index:2;
}

.logo{
    display:block;
    margin:0 auto 20px;
    max-width:170px;
}

h1{
    text-align:center;
    font-family:'Orbitron';
    font-size:48px;
    color:var(--accent);
    text-shadow:0 0 20px var(--accent);
}

.subtitle{
    text-align:center;
    opacity:0.7;
    margin-bottom:10px;
}

/* CARDS */
.card{
    background:var(--card);
    border:1px solid rgba(255,140,0,0.2);
    border-radius:18px;
    padding:25px;
    margin:20px 0;
    backdrop-filter:blur(15px);
}

/* PROJECTS */
.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.project{
    background:#111;
    padding:15px;
    border-radius:12px;
    border:1px solid rgba(255,140,0,0.2);
}

/* CHAT */
.chat{
    margin-top:20px;
    background:#0f0f0f;
    border-radius:14px;
    padding:15px;
    border:1px solid rgba(255,140,0,0.2);
    max-height:260px;
    overflow:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    max-width:75%;
    padding:10px 12px;
    border-radius:12px;
    opacity:0;
    transform:translateY(10px);
}

.msg.show{
    animation:pop 0.35s forwards;
}

@keyframes pop{
    to{opacity:1;transform:translateY(0);}
}

.me{align-self:flex-end;background:var(--accent);color:#000;}
.them{align-self:flex-start;background:#1e1e1e;border:1px solid rgba(255,140,0,0.25);}

.cursor{
    display:inline-block;
    width:8px;
    background:var(--accent);
    animation:blink 0.7s infinite;
}

@keyframes blink{50%{opacity:0;}}

/* ONLINE USERS */
.online{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.user{
    background:#111;
    padding:6px 10px;
    border-radius:20px;
    border:1px solid rgba(255,140,0,0.2);
    font-size:12px;
}

/* NOTIFICATIONS */
#notify{
    position:fixed;
    top:20px;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:9999;
}

.note{
    background:#111;
    border-left:3px solid var(--accent);
    padding:10px 14px;
    border-radius:8px;
    animation:slide 0.3s ease;
}

@keyframes slide{
    from{transform:translateX(100px);opacity:0;}
    to{transform:translateX(0);opacity:1;}
}

/* BUTTONS */
.btn{
    display:inline-block;
    padding:12px 18px;
    background:linear-gradient(45deg,#ff8c00,#ffa500);
    color:#000;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.fixed{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--accent);
    color:#000;
    padding:12px 18px;
    border-radius:50px;
    font-weight:bold;
}

.topbar{
    position:fixed;
    top:15px;
    right:15px;
    display:flex;
    gap:10px;
    z-index:999;
}

.topbar button{
    padding:10px;
    border-radius:10px;
    border:1px solid var(--accent);
    background:#111;
    color:#fff;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- GLITCH INTRO -->
<div id="glitch">
    <h1>ACCESSING SYSTEM...</h1>
</div>

<!-- NOTIFICATIONS -->
<div id="notify"></div>

<div class="topbar">
<button onclick="toggleTheme()">🌓</button>
<button onclick="toggleTerminal()">💻</button>
</div>

<div class="container">

<img src="o.png" class="logo">

<h1>🧠 Дневник доброго хакера</h1>
<div class="subtitle">голубоглазый тоннель // system online</div>

<div class="card">
<h2>⚡ Обо мне</h2>
<p>Чётко. Быстро. Без шума.</p>
</div>

<div class="card">
<h2>🔥 SCREENREC 3D</h2>
<video controls width="100%">
<source src="video.mp4">
</video>
</div>

<div class="card">
<h2>🛠 Проекты</h2>
<div class="projects">
<div class="project">EXE сборка Python</div>
<div class="project">GUI приложения</div>
<div class="project">OSINT</div>
<div class="project">Автоматизация</div>
</div>
</div>

<!-- ONLINE USERS -->
<div class="card">
<h2>🟢 Онлайн</h2>
<div class="online" id="online"></div>
</div>

<!-- CHAT -->
<div class="card">
<h2>💬 Live чат-отзывы</h2>
<div class="chat" id="chat"></div>
</div>

<div class="card">
<h2>💰 Цена</h2>
<h1 style="font-size:30px;color:var(--accent);">от 5$</h1>
</div>

<div class="card">
<h2>📡 Контакт</h2>
<a class="btn" href="https://t.me/hackpack1977">Написать в Telegram</a>
</div>

</div>

<a class="fixed" href="https://t.me/hackpack1977">💬 Написать</a>

<script>

function toggleTheme(){
    document.body.classList.toggle("light");
}

/* USERS */
const users=["Alex","Mira","Neo","Ghost","Luna","Zero"];
const online=document.getElementById("online");

users.forEach(u=>{
    let d=document.createElement("div");
    d.className="user";
    d.innerText=u+" 🟢";
    online.appendChild(d);
});

/* CHAT */
const reviews=[
{t:"them",text:"Это реально работает?"},
{t:"me",text:"Да, всё стабильно."},
{t:"them",text:"Выглядит как хакерский интерфейс 🔥"},
{t:"me",text:"Это просто дизайн + JS"},
{t:"them",text:"Очень круто 💯"}
];

let i=0;

function typeText(text,el,cb){
let j=0;
const cursor=document.createElement("span");
cursor.className="cursor";
el.appendChild(cursor);

function step(){
if(j<text.length){
cursor.insertAdjacentText("beforebegin",text[j++]);
setTimeout(step,20);
}else{
cursor.remove();
cb();
}
}
step();
}

function addMsg(){
if(i>=reviews.length) return;

const msg=document.createElement("div");
msg.className="msg "+reviews[i].t;

document.getElementById("chat").appendChild(msg);

setTimeout(()=>msg.classList.add("show"),50);

typeText(reviews[i].text,msg,()=>{
showNote(reviews[i].text);
i++;
setTimeout(addMsg,900);
});
}
addMsg();

/* NOTIFY */
function showNote(text){
const n=document.createElement("div");
n.className="note";
n.innerText="💬 "+text;
document.getElementById("notify").appendChild(n);

setTimeout(()=>n.remove(),3000);
}

</script>

</body>
</html>
